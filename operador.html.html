<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fila</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 15px;
  padding: 20px;
  width: 100%;
  max-width: 400px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #38bdf8;
  cursor: pointer;
}

.priority-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.priority.active {
  background: #22c55e;
  color: white;
}

li {
  background: #334155;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}

/* CORES */
.gestante { border-left: 5px solid #ec4899; }
.pmr { border-left: 5px solid #3b82f6; }
.bebe { border-left: 5px solid #f97316; }
.idoso { border-left: 5px solid #eab308; }

.icon-yellow {
  color: #facc15;
  margin-right: 5px;
}

.time {
  font-size: 12px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">

<!-- CLIENTE -->
<div class="card">
<h2>Entrar na Fila</h2>

<form id="form">
<input id="nome" placeholder="Nome" required>
<input id="apelido" placeholder="Apelido" required>

<div class="priority-buttons">
<button type="button" class="priority" onclick="setPriority(event,'idoso')">+65</button>
<button type="button" class="priority" onclick="setPriority(event,'gestante')">Gestante</button>
<button type="button" class="priority" onclick="setPriority(event,'bebe')">Bebê</button>
<button type="button" class="priority" onclick="setPriority(event,'pmr')">PMR</button>
</div>

<button type="submit">Entrar</button>
</form>

<p id="msg"></p>
</div>

<!-- OPERADOR -->
<div class="card">
<h2>Painel Operador</h2>

<button onclick="chamarProximo()">Chamar Próximo</button>

<ul id="lista"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "fila-de-atendimento-a3637.firebaseapp.com",
  databaseURL: "https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com",
  projectId: "fila-de-atendimento-a3637"
});

const db = getDatabase(app);

let fila = [];
let prioridade = false;
let tipo = "";

/* PRIORIDADE */
window.setPriority = function(e, t) {
  prioridade = true;
  tipo = t;

  document.querySelectorAll(".priority").forEach(b => b.classList.remove("active"));
  e.currentTarget.classList.add("active");
};

/* ENTRAR */
form.addEventListener("submit", e => {
  e.preventDefault();

  push(ref(db,"fila"),{
    nome: nome.value,
    apelido: apelido.value,
    prioridade,
    tipo,
    timestamp: Date.now()
  });

  msg.innerText = "✔ Entraste na fila";
  form.reset();

  prioridade = false;
  tipo = "";
});

/* PRIORIDADE NIVEL */
function prioridadeNivel(tipo){
  switch(tipo){
    case "gestante": return 1;
    case "pmr": return 2;
    case "bebe": return 3;
    case "idoso": return 4;
    default: return 5;
  }
}

/* ICONES */
function getIcon(tipo){
  switch(tipo){
    case "gestante": return '<i class="fa-solid fa-person-pregnant icon-yellow"></i>';
    case "pmr": return '<i class="fa-solid fa-wheelchair icon-yellow"></i>';
    case "bebe": return '<i class="fa-solid fa-baby icon-yellow"></i>';
    case "idoso": return '<i class="fa-solid fa-user icon-yellow"></i>';
    default: return '<i class="fa-solid fa-user"></i>';
  }
}

/* TEMPO */
function tempo(ts){
  return Math.floor((Date.now()-ts)/60000)+" min";
}

/* LER */
onValue(ref(db,"fila"), snap=>{
  const data=snap.val();
  fila=[];

  if(data){
    fila=Object.entries(data).map(([id,v])=>({id,...v}))
    .sort((a,b)=>{
      let pa=prioridadeNivel(a.tipo);
      let pb=prioridadeNivel(b.tipo);
      if(pa!==pb) return pa-pb;
      return a.timestamp-b.timestamp;
    });
  }

  render();
});

/* RENDER */
function render(){
  lista.innerHTML="";

  fila.forEach((p,i)=>{
    const li=document.createElement("li");

    li.classList.add(p.tipo || "");

    li.innerHTML=`
      ${getIcon(p.tipo)}
      ${i+1} - ${p.nome} ${p.apelido}
      <div class="time">
        ${p.tipo ? p.tipo.toUpperCase() : "NORMAL"} | ${tempo(p.timestamp)}
      </div>
    `;

    lista.appendChild(li);
  });
}

/* CHAMAR */
window.chamarProximo=()=>{
  if(!fila.length) return;

  const p=fila[0];
  alert("Chamando: "+p.nome);
  remove(ref(db,"fila/"+p.id));
};

</script>

</body>
</html>
