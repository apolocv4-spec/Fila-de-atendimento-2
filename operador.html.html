<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fila de Atendimento</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  background: #111827;
}

header h1 {
  font-size: 22px;
}

/* CONTAINER PRINCIPAL */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 15px;
  padding: 20px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* TITULOS */
.card h2, .card h3 {
  text-align: center;
  margin-bottom: 15px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 15px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

input:focus {
  outline: 2px solid #38bdf8;
}

/* BOTÕES */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
}

button:hover {
  background: #0ea5e9;
}

/* LISTA OPERADOR */
ul {
  list-style: none;
  margin-top: 10px;
}

li {
  background: #334155;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
}

/* ICONES */
.icon {
  font-size: 35px;
  text-align: center;
  margin-bottom: 10px;
  color: #38bdf8;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>

<body>

<header>
  <h1><i class="fa-solid fa-id-card"></i> Sistema de Atendimento & Controlo de Fronteira</h1>
</header>

<div class="container">

  <!-- CLIENTE -->
  <div class="card">
    <div class="icon">
      <i class="fa-solid fa-users"></i>
    </div>

    <h2>Entrar na Fila</h2>

    <form id="form">
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="text" id="apelido" placeholder="Apelido" required>
      <button type="submit"><i class="fa-solid fa-arrow-right"></i> Entrar na fila</button>
    </form>

    <p id="msg" style="text-align:center;margin-top:10px;"></p>
  </div>

  <!-- OPERADOR -->
  <div class="card">
    <div class="icon">
      <i class="fa-solid fa-passport"></i>
    </div>

    <h3>Painel do Operador</h3>

    <button onclick="chamarProximo()">
      <i class="fa-solid fa-bell"></i> Chamar Próximo
    </button>

    <ul id="lista"></ul>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzUwIf6X3dqd7D0G55_HyAl_vSmsvg9R4",
  authDomain: "fila-de-atendimento-a3637.firebaseapp.com",
  databaseURL: "https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com",
  projectId: "fila-de-atendimento-a3637",
  storageBucket: "fila-de-atendimento-a3637.firebasestorage.app",
  messagingSenderId: "469991078953",
  appId: "1:469991078953:web:8eaf47cba1ed624d33f038"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let fila = [];

/* ENTRAR NA FILA */
document.getElementById("form").addEventListener("submit", (e) => {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const apelido = document.getElementById("apelido").value;

  push(ref(db, "fila"), {
    nome,
    apelido,
    hora: new Date().toLocaleTimeString(),
    timestamp: Date.now()
  });

  document.getElementById("msg").innerText = "✔ Entraste na fila!";
  document.getElementById("form").reset();
});

/* LER FILA */
onValue(ref(db, "fila"), (snapshot) => {
  const data = snapshot.val();
  fila = [];

  if (data) {
    fila = Object.entries(data).map(([id, val]) => ({ id, ...val }))
      .sort((a, b) => a.timestamp - b.timestamp);
  }

  atualizarLista();
});

/* ATUALIZAR LISTA */
function atualizarLista() {
  const ul = document.getElementById("lista");
  ul.innerHTML = "";

  fila.forEach((p, i) => {
    const li = document.createElement("li");
    li.innerHTML = `<i class="fa-solid fa-user"></i> ${i+1} - ${p.nome} ${p.apelido} <br><small>${p.hora}</small>`;
    ul.appendChild(li);
  });
}

/* CHAMAR PRÓXIMO */
window.chamarProximo = function() {
  if (fila.length === 0) return;

  const primeiro = fila[0];

  alert("Chamando: " + primeiro.nome + " " + primeiro.apelido);

  remove(ref(db, "fila/" + primeiro.id));
};

</script>

</body>
</html>
