<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fila de Atendimento</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  background: #111827;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 15px;
  padding: 20px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

input {
  width: 100%;
  padding: 15px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0ea5e9;
}

/* PRIORIDADE */
.priority-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.priority {
  background: #334155;
  color: white;
}

.priority.active {
  background: #22c55e;
}

.warning {
  font-size: 12px;
  margin-top: 5px;
  color: #ccc;
}

/* LISTA */
ul {
  list-style: none;
}

li {
  background: #334155;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
}

.prioritario {
  color: #22c55e;
  font-weight: bold;
  border-left: 5px solid #22c55e;
}

/* ICONES AMARELOS */
.icon-priority {
  color: #facc15;
  margin-right: 5px;
}
</style>
</head>

<body>

<header>
<h1><i class="fa-solid fa-id-card"></i> Sistema de Atendimento</h1>
</header>

<div class="container">

<!-- CLIENTE -->
<div class="card">
<h2>Entrar na Fila</h2>

<form id="form">
<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="apelido" placeholder="Apelido" required>

<div class="priority-buttons">
<button type="button" class="priority" onclick="setPriority(event,'idoso')">
<i class="fa-solid fa-user icon-priority"></i> +65
</button>

<button type="button" class="priority" onclick="setPriority(event,'gestante')">
<i class="fa-solid fa-person-pregnant icon-priority"></i> Gestante
</button>

<button type="button" class="priority" onclick="setPriority(event,'bebe')">
<i class="fa-solid fa-baby icon-priority"></i> Bebê
</button>

<button type="button" class="priority" onclick="setPriority(event,'pmr')">
<i class="fa-solid fa-wheelchair icon-priority"></i> PMR
</button>
</div>

<p class="warning">⚠️ Use prioridade apenas se aplicável</p>

<button type="submit">Entrar na fila</button>
</form>

<p id="msg"></p>
</div>

<!-- OPERADOR -->
<div class="card">
<h3>Painel do Operador</h3>

<button onclick="chamarProximo()">Chamar Próximo</button>

<ul id="lista"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzUwIf6X3dqd7D0G55_HyAl_vSmsvg9R4",
  authDomain: "fila-de-atendimento-a3637.firebaseapp.com",
  databaseURL: "https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com",
  projectId: "fila-de-atendimento-a3637"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let fila = [];
let prioridade = false;
let tipo = "";

/* SELECIONAR PRIORIDADE */
window.setPriority = function(e, t) {
  prioridade = true;
  tipo = t;

  document.querySelectorAll(".priority").forEach(btn => btn.classList.remove("active"));
  e.currentTarget.classList.add("active");
};

/* ENTRAR NA FILA */
document.getElementById("form").addEventListener("submit", (e) => {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const apelido = document.getElementById("apelido").value;

  push(ref(db, "fila"), {
    nome,
    apelido,
    prioridade,
    tipo,
    hora: new Date().toLocaleTimeString(),
    timestamp: Date.now()
  });

  document.getElementById("msg").innerText = "✔ Entraste na fila!";
  document.getElementById("form").reset();

  prioridade = false;
  tipo = "";
  document.querySelectorAll(".priority").forEach(btn => btn.classList.remove("active"));
});

/* LER FILA */
onValue(ref(db, "fila"), (snapshot) => {
  const data = snapshot.val();
  fila = [];

  if (data) {
    fila = Object.entries(data).map(([id, val]) => ({ id, ...val }))
      .sort((a, b) => {
        if (a.prioridade && !b.prioridade) return -1;
        if (!a.prioridade && b.prioridade) return 1;
        return a.timestamp - b.timestamp;
      });
  }

  atualizarLista();
});

/* ICONES */
function getIcon(tipo) {
  switch(tipo) {
    case "idoso":
      return '<i class="fa-solid fa-user icon-priority"></i> +65';
    case "gestante":
      return '<i class="fa-solid fa-person-pregnant icon-priority"></i> Gestante';
    case "bebe":
      return '<i class="fa-solid fa-baby icon-priority"></i> Bebê';
    case "pmr":
      return '<i class="fa-solid fa-wheelchair icon-priority"></i> PMR';
    default:
      return '<i class="fa-solid fa-user"></i>';
  }
}

/* ATUALIZAR LISTA */
function atualizarLista() {
  const ul = document.getElementById("lista");
  ul.innerHTML = "";

  fila.forEach((p, i) => {
    const li = document.createElement("li");

    let iconHtml = '<i class="fa-solid fa-user"></i>';
    let prioridadeInfo = "";

    if (p.prioridade) {
      li.classList.add("prioritario");
      iconHtml = getIcon(p.tipo);
      prioridadeInfo = `<br><small>Prioritário - ${p.tipo}</small>`;
    }

    li.innerHTML = `
      ${iconHtml}
      ${i+1} - ${p.nome} ${p.apelido}
      ${prioridadeInfo}
      <br><small>${p.hora}</small>
    `;

    ul.appendChild(li);
  });
}

/* CHAMAR */
window.chamarProximo = function() {
  if (fila.length === 0) return;

  const p = fila[0];
  alert("Chamando: " + p.nome + " " + p.apelido);
  remove(ref(db, "fila/" + p.id));
};

</script>

</body>
</html>
