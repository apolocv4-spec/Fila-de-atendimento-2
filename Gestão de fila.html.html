<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestão de Fila e Controlo de Passaporte</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body { background:#0f172a; color:white; }

header { text-align:center; padding:20px; background:#111827; }
header h1 { font-size:22px; }

.container { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }

.card {
  background:#1e293b;
  border-radius:15px;
  padding:20px;
  width:100%;
  max-width:420px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

input {
  width:100%;
  padding:15px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

ul { list-style:none; margin-top:10px; }

li {
  background:#334155;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}

.icon {
  font-size:35px;
  text-align:center;
  margin-bottom:10px;
  color:#38bdf8;
}

.icon-yellow {
  color:#facc15;
  margin-right:6px;
}

.gestante { border-left:5px solid #ec4899; }
.pmr { border-left:5px solid #3b82f6; }
.bebe { border-left:5px solid #f97316; }
.idoso { border-left:5px solid #eab308; }

.prioritario {
  color:#22c55e;
  font-weight:bold;
}

.priority-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
  margin-bottom:25px;
}

.priority-btn {
  background:white;
  color:black;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  font-weight:bold;
  border:1px solid #cbd5e1;
}

.priority-btn.active {
  background:#22c55e;
  color:white;
}

.time {
  font-size:12px;
  color:#cbd5e1;
  margin-top:3px;
}

.card h3 { margin-bottom:20px; }

/* STICK NOTE MELHORADO */
.stick-note {
  background:#fef08a;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-top:20px;
}

.stick-toolbar {
  display:flex;
  gap:6px;
  margin-bottom:8px;
}

.tool-btn {
  width:26px;
  height:26px;
  border:none;
  border-radius:6px;
  background:#e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.tool-btn i { font-size:12px; color:#111; }
.tool-btn.green i { color:#22c55e; }
.tool-btn.yellow i { color:#eab308; }
.tool-btn.red i { color:#ef4444; }

.note-area {
  min-height:100px;
  background:white;
  border-radius:8px;
  padding:10px;
  outline:none;
  font-size:14px;
}

@media (max-width:768px) {
  .container { flex-direction:column; align-items:center; }
}
</style>
</head>

<body>

<header>
  <h1><i class="fa-solid fa-id-card"></i> Sistema de Gestão de Fila e Controlo de Passaporte</h1>
</header>

<div class="container">

<!-- CLIENTE -->
<div class="card">
  <div class="icon"><i class="fa-solid fa-users"></i></div>
  <h2>Entrar na Fila</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="apelido" placeholder="Apelido" required>

    <div class="priority-grid">
      <div class="priority-btn" onclick="setPriority(event,'idoso')">
        <i class="fa-solid fa-user"></i> +65
      </div>
      <div class="priority-btn" onclick="setPriority(event,'gestante')">
        <i class="fa-solid fa-person-pregnant"></i> Gestante
      </div>
      <div class="priority-btn" onclick="setPriority(event,'bebe')">
        <i class="fa-solid fa-baby"></i> Bebé
      </div>
      <div class="priority-btn" onclick="setPriority(event,'pmr')">
        <i class="fa-solid fa-wheelchair"></i> PMR
      </div>
    </div>

    <button type="submit">
      <i class="fa-solid fa-arrow-right"></i> Entrar na fila
    </button>
  </form>

  <p id="msg"></p>
</div>

<!-- OPERADOR -->
<div class="card">
  <div class="icon"><i class="fa-solid fa-passport"></i></div>

  <h3>Painel do Operador</h3>

  <button onclick="chamarProximo()">
    <i class="fa-solid fa-bell"></i> Chamar Próximo
  </button>

  <ul id="lista"></ul>

  <!-- STICK NOTE -->
  <div class="stick-note">
    <div class="stick-toolbar">
      <button class="tool-btn" onclick="formatText('bold')">
        <i class="fa-solid fa-bold"></i>
      </button>
      <button class="tool-btn green" onclick="setColor('green')">
        <i class="fa-solid fa-circle"></i>
      </button>
      <button class="tool-btn yellow" onclick="setColor('orange')">
        <i class="fa-solid fa-circle"></i>
      </button>
      <button class="tool-btn red" onclick="setColor('red')">
        <i class="fa-solid fa-circle"></i>
      </button>
    </div>

    <div id="note" class="note-area" contenteditable="true"></div>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzUwIf6X3dqd7D0G55_HyAl_vSmsvg9R4",
  authDomain: "fila-de-atendimento-a3637.firebaseapp.com",
  databaseURL: "https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com",
  projectId: "fila-de-atendimento-a3637",
  storageBucket: "fila-de-atendimento-a3637.appspot.com",
  messagingSenderId: "469991078953",
  appId: "1:469991078953:web:8eaf47cba1ed624d33f038"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let fila = [];
let tipo = "";

window.setPriority = function(e,t){
  tipo = t;
  document.querySelectorAll(".priority-btn").forEach(b=>b.classList.remove("active"));
  e.currentTarget.classList.add("active");
};

document.getElementById("form").addEventListener("submit",(e)=>{
  e.preventDefault();

  push(ref(db,"fila"),{
    nome: nome.value,
    apelido: apelido.value,
    tipo: tipo || "normal",
    timestamp: Date.now()
  });

  msg.innerText = "✔ Entraste na fila!";
  form.reset();
  tipo = "";
});

function getIcon(t){
  switch(t){
    case "gestante": return '<i class="fa-solid fa-person-pregnant icon-yellow"></i>';
    case "pmr": return '<i class="fa-solid fa-wheelchair icon-yellow"></i>';
    case "bebe": return '<i class="fa-solid fa-baby icon-yellow"></i>';
    case "idoso": return '<i class="fa-solid fa-user icon-yellow"></i>';
    default: return '<i class="fa-solid fa-user"></i>';
  }
}

function tempo(ts){
  return Math.floor((Date.now() - ts) / 60000) + " min";
}

function tipoTexto(t){
  switch(t){
    case "gestante": return "GESTANTE";
    case "pmr": return "PMR";
    case "bebe": return "BEBÉ";
    case "idoso": return "IDOSO";
    default: return "NORMAL";
  }
}

function prioridadeNivel(t){
  switch(t){
    case "gestante": return 1;
    case "pmr": return 2;
    case "bebe": return 3;
    case "idoso": return 4;
    default: return 5;
  }
}

onValue(ref(db,"fila"),snap=>{
  const data=snap.val();
  fila=[];

  if(data){
    fila=Object.entries(data).map(([id,v])=>({id,...v}))
    .sort((a,b)=>{
      let pa=prioridadeNivel(a.tipo);
      let pb=prioridadeNivel(b.tipo);
      if(pa!==pb) return pa-pb;
      return a.timestamp-b.timestamp;
    });
  }

  render();
});

function render(){
  lista.innerHTML="";

  fila.forEach((p,i)=>{
    const li=document.createElement("li");

    if(p.tipo==="gestante") li.classList.add("gestante");
    if(p.tipo==="pmr") li.classList.add("pmr");
    if(p.tipo==="bebe") li.classList.add("bebe");
    if(p.tipo==="idoso") li.classList.add("idoso");

    const nomeClass = p.tipo !== "normal" ? "prioritario" : "";

    li.innerHTML = `
      ${getIcon(p.tipo)}
      <span class="${nomeClass}">
        ${i+1} - ${p.nome} ${p.apelido}
      </span>
      <div class="time">
        ${tipoTexto(p.tipo)} | ${tempo(p.timestamp)}
      </div>
    `;

    lista.appendChild(li);
  });
}

window.chamarProximo=()=>{
  if(!fila.length) return;
  const p=fila[0];
  alert("Chamando: "+p.nome);
  remove(ref(db,"fila/"+p.id));
};

/* STICK NOTE */
window.formatText = function(cmd){
  document.execCommand(cmd,false,null);
}

window.setColor = function(color){
  document.execCommand("foreColor",false,color);
}

</script>

</body>
</html>
