<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestão de Fila</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f172a;color:white;}

header{text-align:center;padding:20px;background:#111827;}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
width:100%;
max-width:420px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

ul{list-style:none;margin-top:10px;}

li{
background:#334155;
padding:10px;
margin:5px 0;
border-radius:8px;
}

/* PRIORIDADES */
.prio-idoso{border-left:6px solid #eab308;}
.prio-gestante{border-left:6px solid #ec4899;}
.prio-bebe{border-left:6px solid #f97316;}
.prio-pmr{border-left:6px solid #3b82f6;}

.time{font-size:12px;color:#cbd5e1;margin-top:4px;}
.prioritario{font-weight:bold;color:#22c55e;}

.icon{font-size:30px;text-align:center;margin-bottom:10px;color:#38bdf8;}

.check-list li{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.small-btn{
background:#ef4444;
color:white;
border:none;
border-radius:6px;
font-size:11px;
padding:4px 8px;
cursor:pointer;
width:auto !important;
display:inline-block;
white-space:nowrap;
flex-shrink:0;
}

.abandono{
background:#b91c1c !important;
color:white !important;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
}

.badge{
display:flex;
align-items:center;
gap:8px;
}

.yellow{color:#eab308;}
.blue{color:#3b82f6;}
.orange{color:#f97316;}
.pink{color:#ec4899;}

.priority-btn{
display:flex;
gap:8px;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
cursor:pointer;
background:#0f172a;
color:white;
}

.priority-btn.active{
background:#22c55e;
color:black;
}

/* NOTES */
.notes{margin-top:15px;}

.toolbar{
display:flex;
gap:6px;
margin-bottom:6px;
}

.tool-btn{
flex:1;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
background:#334155;
color:white;
}

.editor{
min-height:100px;
background:white;
color:black;
padding:10px;
border-radius:8px;
outline:none;
}
</style>
</head>

<body>

<header>
<h2><i class="fa-solid fa-id-card"></i> Sistema de Gestão de Fila</h2>
</header>

<div class="container">

<!-- PAINEL 1 -->
<div class="card">
<div class="icon"><i class="fa-solid fa-users"></i></div>

<h3>Entrar na Fila</h3>

<form id="form">
<input id="nome" placeholder="Nome">
<input id="apelido" placeholder="Apelido">

<button type="button" class="priority-btn" onclick="setPriority(event,'idoso')">
<i class="fa-solid fa-user yellow"></i> Idoso +65
</button>

<button type="button" class="priority-btn" onclick="setPriority(event,'gestante')">
<i class="fa-solid fa-person-pregnant pink"></i> Gestante
</button>

<button type="button" class="priority-btn" onclick="setPriority(event,'bebe')">
<i class="fa-solid fa-baby orange"></i> Bebé
</button>

<button type="button" class="priority-btn" onclick="setPriority(event,'pmr')">
<i class="fa-solid fa-wheelchair blue"></i> PMR
</button>

<button type="submit">Entrar</button>
</form>

<p id="msg"></p>
</div>

<!-- PAINEL 2 -->
<div class="card">
<h3>Lista Verificação</h3>

<input id="vnome" placeholder="Nome">
<input id="vapelido" placeholder="Apelido">
<input id="vdata" type="date">

<button onclick="addVerificacao()">Adicionar</button>

<ul id="vlista" class="check-list"></ul>
</div>

<!-- PAINEL 3 -->
<div class="card">
<div class="icon"><i class="fa-solid fa-passport"></i></div>

<h3>Painel Operador</h3>

<button onclick="chamarProximo()">
<i class="fa-solid fa-bell"></i> Chamar Próximo
</button>

<ul id="lista"></ul>

<!-- NOTES -->
<div class="notes">
<h4>Bloco de Notas</h4>

<div class="toolbar">
<button class="tool-btn" onclick="format('bold')"><i class="fa-solid fa-bold"></i></button>
<button class="tool-btn" onclick="colorText('black')"><i class="fa-solid fa-circle"></i></button>
<button class="tool-btn" onclick="colorText('#f97316')"><i class="fa-solid fa-circle" style="color:#f97316"></i></button>
<button class="tool-btn" onclick="colorText('#22c55e')"><i class="fa-solid fa-circle" style="color:#22c55e"></i></button>
<button class="tool-btn" onclick="colorText('#eab308')"><i class="fa-solid fa-circle" style="color:#eab308"></i></button>
</div>

<div id="editor" class="editor" contenteditable="true"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
databaseURL:"https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let fila=[];
let tipo="";
let verificacao=[];

window.setPriority=(e,t)=>{
tipo=t;
document.querySelectorAll(".priority-btn").forEach(b=>b.classList.remove("active"));
e.currentTarget.classList.add("active");
};

form.onsubmit=e=>{
e.preventDefault();

push(ref(db,"fila"),{
nome:nome.value,
apelido:apelido.value,
tipo:tipo||"normal",
timestamp:Date.now()
});

msg.innerText="✔ Entraste!";
form.reset();
tipo="";
};

window.removerVerificacao=(id)=>{
remove(ref(db,"verificacao/"+id));
};

window.addVerificacao=()=>{
push(ref(db,"verificacao"),{
nome:vnome.value,
apelido:vapelido.value,
data:vdata.value
});
};

onValue(ref(db,"verificacao"),snap=>{
const data=snap.val();
verificacao=data?Object.entries(data).map(([id,v])=>({id,...v})):[];

vlista.innerHTML="";
verificacao.forEach(p=>{
vlista.innerHTML+=`
<li>
${p.nome} ${p.apelido} - ${p.data}
<button class="small-btn" onclick="removerVerificacao('${p.id}')">remover</button>
</li>`;
});
});

function iconTipo(t){
switch(t){
case "idoso": return '<i class="fa-solid fa-user yellow"></i>';
case "pmr": return '<i class="fa-solid fa-wheelchair blue"></i>';
case "bebe": return '<i class="fa-solid fa-baby orange"></i>';
case "gestante": return '<i class="fa-solid fa-person-pregnant pink"></i>';
default: return '<i class="fa-solid fa-user"></i>';
}
}

function prioClass(t){
switch(t){
case "idoso": return "prio-idoso";
case "gestante": return "prio-gestante";
case "bebe": return "prio-bebe";
case "pmr": return "prio-pmr";
default: return "";
}
}

onValue(ref(db,"fila"),snap=>{
const data=snap.val();
fila=data?Object.entries(data).map(([id,v])=>({id,...v})):[];

render();
});

function render(){
lista.innerHTML="";

fila.forEach((p)=>{

let abandono = verificacao.find(v=>v.nome===p.nome && v.apelido===p.apelido);
let isPriority = ["idoso","gestante","bebe","pmr"].includes(p.tipo);

if(abandono){
lista.innerHTML+=`
<li class="abandono">
<i class="fa-solid fa-plane"></i>
ABANDONO VOLUNTÁRIO - ${p.nome} ${p.apelido}
</li>`;
}else{
lista.innerHTML+=`
<li class="${prioClass(p.tipo)}">
<div class="badge">
${iconTipo(p.tipo)}
<b class="${isPriority ? 'prioritario' : ''}">${p.nome} ${p.apelido}</b>
</div>
<div class="time">
${p.tipo.toUpperCase()} | ${Math.floor((Date.now()-p.timestamp)/60000)} min
</div>
</li>`;
}
});
}

window.chamarProximo=()=>{
if(!fila.length)return;
remove(ref(db,"fila/"+fila[0].id));
};

/* NOTES */
const editor = document.getElementById("editor");

/* carregar ao abrir */
editor.innerHTML = localStorage.getItem("notes") || "";

/* guardar automático */
editor.addEventListener("input", ()=>{
localStorage.setItem("notes", editor.innerHTML);
});

window.format=(cmd)=>{
document.execCommand(cmd,false,null);
};

window.colorText=(color)=>{
document.execCommand("foreColor", false, color);
};

</script>

</body>
</html>
