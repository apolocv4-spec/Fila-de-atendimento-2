<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestão de Fila e Controlo de Passaporte</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body { background:#0f172a; color:white; }

header { text-align:center; padding:20px; background:#111827; }
header h1 { font-size:22px; }

.container { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }

.card {
  background:#1e293b;
  border-radius:15px;
  padding:20px;
  width:100%;
  max-width:420px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

input {
  width:100%;
  padding:15px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

ul { list-style:none; margin-top:10px; }

li {
  background:#334155;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}

.icon {
  font-size:35px;
  text-align:center;
  margin-bottom:10px;
  color:#38bdf8;
}

.icon-yellow { color:#facc15; margin-right:6px; }

.gestante { border-left:5px solid #ec4899; }
.pmr { border-left:5px solid #3b82f6; }
.bebe { border-left:5px solid #f97316; }
.idoso { border-left:5px solid #eab308; }

.prioritario { color:#22c55e; font-weight:bold; }

.priority-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
  margin-bottom:25px;
}

.priority-btn {
  background:white;
  color:black;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  font-weight:bold;
  border:1px solid #cbd5e1;
}

.priority-btn.active {
  background:#22c55e;
  color:white;
}

.time {
  font-size:12px;
  color:#cbd5e1;
  margin-top:3px;
}

.stick-note {
  background:#fef08a;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-top:20px;
}

.stick-toolbar {
  display:flex;
  gap:6px;
  margin-bottom:8px;
}

.tool-btn {
  width:26px;
  height:26px;
  border:none;
  border-radius:6px;
  background:#e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.tool-btn i { font-size:12px; color:#111; }
.tool-btn.green i { color:#22c55e; }
.tool-btn.yellow i { color:#eab308; }
.tool-btn.red i { color:#ef4444; }
.tool-btn.black i { color:#000; }

.note-area {
  min-height:100px;
  background:white;
  border-radius:8px;
  padding:10px;
  outline:none;
  font-size:14px;
  direction:ltr;
  text-align:left;
}

/* LOGIN */
#loginOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.login-box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:300px;
}

.logout-btn{
  position:fixed;
  top:10px;
  right:10px;
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border:none;
  border-radius:8px;
  background:#ef4444;
  color:white;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div id="loginOverlay">
  <div class="login-box">
    <h3>Login Operador</h3>
    <input type="password" id="senhaInput" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<button class="logout-btn" id="logoutBtn" onclick="logout()">Logout</button>

<header>
  <h1><i class="fa-solid fa-id-card"></i> Sistema de Gestão de Fila</h1>
</header>

<div class="container">

<div class="card">
  <div class="icon"><i class="fa-solid fa-users"></i></div>

  <h2>Entrar na Fila</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="apelido" placeholder="Apelido" required>

    <div class="priority-grid">
      <div class="priority-btn" onclick="setPriority(event,'idoso')">+65</div>
      <div class="priority-btn" onclick="setPriority(event,'gestante')">Gestante</div>
      <div class="priority-btn" onclick="setPriority(event,'bebe')">Bebé</div>
      <div class="priority-btn" onclick="setPriority(event,'pmr')">PMR</div>
    </div>

    <button type="submit">Entrar</button>
  </form>

  <p id="msg"></p>
</div>

<div class="card" id="painelOperador" style="display:none;">
  <button onclick="chamarProximo()">Chamar Próximo</button>
  <ul id="lista"></ul>

  <div class="stick-note">
    <div class="stick-toolbar">
      <button class="tool-btn" onclick="formatText('bold')"><i class="fa-solid fa-bold"></i></button>
      <button class="tool-btn green" onclick="setColor('green')"><i class="fa-solid fa-circle"></i></button>
      <button class="tool-btn yellow" onclick="setColor('orange')"><i class="fa-solid fa-circle"></i></button>
      <button class="tool-btn red" onclick="setColor('red')"><i class="fa-solid fa-circle"></i></button>
      <button class="tool-btn black" onclick="setColor('black')"><i class="fa-solid fa-circle"></i></button>
    </div>

    <div id="note" class="note-area" contenteditable="true"></div>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

let fila=[]; let tipo="";

/* LOGIN */
window.login=async()=>{
  const s=await fetch("https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com/senhaOperador.json").then(r=>r.json());
  if(senhaInput.value==s){
    sessionStorage.setItem("logado","true");
    loginOverlay.style.display="none";
    painelOperador.style.display="block";
    logoutBtn.style.display="block";
  }else alert("Senha errada");
}

window.onload=()=>{
  if(sessionStorage.getItem("logado")){
    loginOverlay.style.display="none";
    painelOperador.style.display="block";
    logoutBtn.style.display="block";
  }
}

window.logout=()=>{
  sessionStorage.removeItem("logado");
  location.reload();
}

/* PRIORIDADE */
window.setPriority=(e,t)=>{
  tipo=t;
  document.querySelectorAll(".priority-btn").forEach(b=>b.classList.remove("active"));
  e.currentTarget.classList.add("active");
};

/* FILA */
form.onsubmit=e=>{
  e.preventDefault();
  push(ref(db,"fila"),{
    nome:nome.value,
    apelido:apelido.value,
    tipo:tipo||"normal",
    timestamp:Date.now()
  });
  msg.innerText="✔ Entraste na fila!";
  form.reset(); tipo="";
};

function prioridadeNivel(t){
  return {gestante:1,pmr:2,bebe:3,idoso:4}[t]||5;
}

onValue(ref(db,"fila"),snap=>{
  const d=snap.val();
  fila=d?Object.entries(d).map(([id,v])=>({id,...v}))
  .sort((a,b)=>prioridadeNivel(a.tipo)-prioridadeNivel(b.tipo)||a.timestamp-b.timestamp):[];
  render();
});

function render(){
  lista.innerHTML="";
  fila.forEach((p,i)=>{
    const li=document.createElement("li");

    if(p.tipo!=="normal") li.classList.add(p.tipo);

    const nomeClass=p.tipo!=="normal"?"prioritario":"";

    li.innerHTML=`
      <span class="${nomeClass}">${i+1} - ${p.nome} ${p.apelido}</span>
      <div class="time">${p.tipo.toUpperCase()} | ${Math.floor((Date.now()-p.timestamp)/60000)} min</div>
    `;
    lista.appendChild(li);
  });
}

window.chamarProximo=()=>{
  if(!fila.length)return;
  alert("Chamando: "+fila[0].nome);
  remove(ref(db,"fila/"+fila[0].id));
};

/* ===== CORREÇÃO STICK NOTE ===== */

const note = document.getElementById("note");
const noteRef = ref(db,"nota");

let escrevendo = false;

note.addEventListener("focus", ()=> escrevendo = true);
note.addEventListener("blur", ()=> escrevendo = false);

/* ENTER normal (sem inverter) */
note.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    document.execCommand("insertLineBreak");
  }
});

/* guardar */
note.addEventListener("input",()=>{
  set(noteRef,{texto:note.innerHTML});
});

/* carregar sem mexer no cursor */
onValue(noteRef,(snap)=>{
  const data=snap.val();
  if(data && !escrevendo && note.innerHTML !== data.texto){
    note.innerHTML = data.texto;
  }
});

/* formatação */
window.formatText=c=>document.execCommand(c,false,null);
window.setColor=c=>document.execCommand("foreColor",false,c);

</script>

</body>
</html>
