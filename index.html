<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Entrar na Fila</title>
</head>
<body>

<h2>Fila de Atendimento</h2>

<form id="form">
  <input type="text" id="nome" placeholder="Nome" required><br>
  <input type="text" id="apelido" placeholder="Apelido" required><br>
  <button type="submit">Entrar</button>
</form>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// CONFIGURAÇÃO FIREBASE (vou te explicar abaixo como criar)
 const firebaseConfig = {
  apiKey: "AIzaSyBzUwIf6X3dqd7D0G55_HyAl_vSmsvg9R4",
  authDomain: "fila-de-atendimento-a3637.firebaseapp.com",
  databaseURL: "https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com",
  projectId: "fila-de-atendimento-a3637",
  storageBucket: "fila-de-atendimento-a3637.firebasestorage.app",
  messagingSenderId: "469991078953",
  appId: "1:469991078953:web:8eaf47cba1ed624d33f038"
};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("form").addEventListener("submit", (e) => {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const apelido = document.getElementById("apelido").value;

  const hora = new Date().toLocaleTimeString();

  push(ref(db, "fila"), {
    nome,
    apelido,
    hora,
    timestamp: Date.now()
  });

  document.getElementById("msg").innerText =
    "✅ Você entrou na fila. Aguarde ser chamado.";

  document.getElementById("form").reset();
});
</script>

</body>
</html>
