<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila de Atendimento</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #007bff, #00c6ff);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.icon {
  font-size: 50px;
  color: #007bff;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* BOTÃO */
button.submit {
  width: 100%;
  padding: 15px;
  background: #007bff;
  color: white;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* PRIORIDADE */
.priority-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.priority {
  background: #f1f1f1;
  color: black;
  border: 1px solid #ccc;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
}

.priority i {
  color: black;
}

.priority.active {
  background: #22c55e;
  color: white;
}

.priority.active i {
  color: white;
}

/* 🔵 ESPAÇAMENTO CORRIGIDO */
.warning {
  font-size: 12px;
  color: #666;
  margin-top: 14px;   /* 👈 mais espaço acima */
  margin-bottom: 18px; /* 👈 separa do botão */
  line-height: 1.4;
}

#msg {
  margin-top: 10px;
  color: green;
}
</style>
</head>

<body>

<div class="container">

<div class="icon">
  <i class="fa-solid fa-users"></i>
</div>

<h2>Fila de Atendimento</h2>

<form id="form">

<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="apelido" placeholder="Apelido" required>

<div class="priority-buttons">

<button type="button" class="priority" onclick="setPriority(event,'idoso')">
  <i class="fa-solid fa-user"></i> +65
</button>

<button type="button" class="priority" onclick="setPriority(event,'gestante')">
  <i class="fa-solid fa-person-pregnant"></i> Gestante
</button>

<button type="button" class="priority" onclick="setPriority(event,'bebe')">
  <i class="fa-solid fa-baby"></i> Bebê
</button>

<button type="button" class="priority" onclick="setPriority(event,'pmr')">
  <i class="fa-solid fa-wheelchair"></i> PMR
</button>

</div>

<p class="warning">
⚠️ Utilize prioridade apenas se aplicável.
</p>

<button class="submit" type="submit">Entrar na Fila</button>

</form>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "fila-de-atendimento-a3637.firebaseapp.com",
  databaseURL: "https://fila-de-atendimento-a3637-default-rtdb.firebaseio.com",
  projectId: "fila-de-atendimento-a3637"
});

const db = getDatabase(app);

let prioridade = false;
let tipo = "";

window.setPriority = function(e, t) {
  prioridade = true;
  tipo = t;

  document.querySelectorAll(".priority").forEach(b => b.classList.remove("active"));
  e.currentTarget.classList.add("active");
};

document.getElementById("form").addEventListener("submit", (e) => {
  e.preventDefault();

  push(ref(db,"fila"),{
    nome: nome.value.trim(),
    apelido: apelido.value.trim(),
    prioridade,
    tipo: prioridade ? tipo : "normal",
    timestamp: Date.now()
  });

  msg.innerText = "✔ Entraste na fila!";

  form.reset();
  prioridade = false;
  tipo = "";

  document.querySelectorAll(".priority").forEach(b => b.classList.remove("active"));
});

</script>

</body>
</html>
